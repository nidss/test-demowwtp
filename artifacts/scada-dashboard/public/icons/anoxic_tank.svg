<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- SHADOW -->
  <ellipse cx="120" cy="208" rx="76" ry="10" fill="#00000020"></ellipse>

  <!-- TANK BODY -->
  <rect x="34" y="44" width="172" height="148" rx="26" fill="#334155"></rect>

  <!-- INNER WALL -->
  <rect x="46" y="56" width="148" height="124" rx="18" fill="#475569"></rect>

  <!-- WATER AREA -->
  <clipPath id="anoxicClip">
    <rect x="46" y="56" width="148" height="124" rx="18"></rect>
  </clipPath>

  <g clip-path="url(#anoxicClip)">

    <!-- WATER -->
    <rect x="46" y="92" width="148" height="88" fill="#14532D"></rect>

    <!-- SURFACE -->
    <path d="
      M46 100
      C62 92 76 110 92 100
      C108 92 122 110 138 100
      C154 92 170 108 194 100
      V180
      H46
      Z" fill="#166534">

      <animateTransform attributeName="transform" type="translate" values="0 0;0 3;0 0" dur="3s" repeatCount="indefinite"></animateTransform>

    </path>

    <!-- LOW OXYGEN PARTICLES -->
    <circle cx="78" cy="126" r="2.5" fill="#4ADE80" opacity="0.45">
      <animate attributeName="cy" values="126;122;126" dur="2.5s" repeatCount="indefinite"></animate>
    </circle>

    <circle cx="122" cy="138" r="2" fill="#86EFAC" opacity="0.4">
      <animate attributeName="cy" values="138;132;138" dur="3s" repeatCount="indefinite"></animate>
    </circle>

    <circle cx="164" cy="120" r="2.5" fill="#4ADE80" opacity="0.4">
      <animate attributeName="cy" values="120;116;120" dur="2.2s" repeatCount="indefinite"></animate>
    </circle>

  </g>

  <!-- MIXER SHAFT -->
  <rect x="116" y="58" width="8" height="66" rx="4" fill="#CBD5E1"></rect>

  <!-- SUBMERSIBLE MIXER -->
  <g transform="translate(120 128)">

    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="2.8s" repeatCount="indefinite" additive="sum"></animateTransform>

    <!-- BLADES -->
    <path d="M0 -22 C10 -18 14 -10 10 0 L0 0Z" fill="#38BDF8"></path>
    <path d="M22 0 C18 10 10 14 0 10 L0 0Z" fill="#0EA5E9"></path>
    <path d="M0 22 C-10 18 -14 10 -10 0 L0 0Z" fill="#0284C7"></path>
    <path d="M-22 0 C-18 -10 -10 -14 0 -10 L0 0Z" fill="#0369A1"></path>

    <!-- HUB -->
    <circle cx="0" cy="0" r="8" fill="#E2E8F0"></circle>
    <circle cx="0" cy="0" r="3" fill="#64748B"></circle>

  </g>

  <!-- FLOW CURRENT -->
  <g opacity="0.5">

    <path d="M70 148
             C92 138 110 158 132 148
             C150 140 162 152 176 148" stroke="#86EFAC" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 10">

      <animate attributeName="stroke-dashoffset" from="18" to="0" dur="1s" repeatCount="indefinite"></animate>

    </path>

  </g>

  <!-- TOP MOTOR -->
  <rect x="90" y="18" width="60" height="28" rx="8" fill="#1E293B"></rect>
  <rect x="102" y="8" width="36" height="14" rx="5" fill="#475569"></rect>

  <!-- INLET PIPE -->
  <rect x="10" y="96" width="36" height="22" rx="6" fill="#64748B"></rect>
  <rect x="16" y="102" width="24" height="10" rx="3" fill="#94A3B8"></rect>

  <!-- OUTLET PIPE -->
  <rect x="194" y="126" width="36" height="22" rx="6" fill="#64748B"></rect>
  <rect x="200" y="132" width="24" height="10" rx="3" fill="#94A3B8"></rect>

  <!-- NO OXYGEN ICON -->
  <g transform="translate(172 74)">

    <circle cx="0" cy="0" r="14" fill="#1E293B"></circle>
    <text x="-7" y="5" font-size="12" font-family="Arial" fill="#F87171">O₂</text>

    <line x1="-10" y1="-10" x2="10" y2="10" stroke="#EF4444" stroke-width="3" stroke-linecap="round"></line>

  </g>

  <!-- STATUS LIGHT -->
  <circle cx="156" cy="30" r="5" fill="#22C55E">
    <animate attributeName="opacity" values="1;0.35;1" dur="1.2s" repeatCount="indefinite"></animate>
  </circle>

</svg>
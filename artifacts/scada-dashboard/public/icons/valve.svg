  <!-- PIPE LEFT -->
  <rect x="16" y="102" width="72" height="36" rx="8" fill="#64748B"></rect>
  <rect x="24" y="110" width="56" height="20" rx="4" fill="#94A3B8"></rect>

  <!-- PIPE RIGHT -->
  <rect x="152" y="102" width="72" height="36" rx="8" fill="#64748B"></rect>
  <rect x="160" y="110" width="56" height="20" rx="4" fill="#94A3B8"></rect>

  <!-- VALVE BODY -->
  <path d="M88 82
           L152 82
           L178 120
           L152 158
           L88 158
           L62 120Z" fill="#334155"></path>

  <!-- INNER BODY -->
  <path d="M96 94
           L144 94
           L164 120
           L144 146
           L96 146
           L76 120Z" fill="#475569"></path>

  <!-- CENTER SEAL -->
  <circle cx="120" cy="120" r="18" fill="#CBD5E1"></circle>
  <circle cx="120" cy="120" r="8" fill="#64748B"></circle>

  <!-- VALVE HANDLE -->
<g>

  <!-- STEM -->
  <rect x="116" y="64" width="8" height="30" rx="4" fill="#94A3B8"></rect>

  <!-- HANDLE -->
  <rect x="84" y="52" width="72" height="16" rx="8" fill="#1E293B"></rect>

  <!-- HANDLE GRIPS -->
  <circle cx="92" cy="60" r="7" fill="#E2E8F0"></circle>
  <circle cx="148" cy="60" r="7" fill="#E2E8F0"></circle>

</g>
  <!-- TOP CAP -->
  <rect x="104" y="84" width="32" height="16" rx="6" fill="#1E293B"></rect>

  <!-- BOLTS -->
  <circle cx="82" cy="120" r="4" fill="#CBD5E1"></circle>

    <path d="M96 120H144" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 8">

      <animate attributeName="stroke-dashoffset" from="18" to="0" dur="0.8s" repeatCount="indefinite"></animate>


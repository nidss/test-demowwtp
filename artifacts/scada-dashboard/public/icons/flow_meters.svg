<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- SHADOW -->
  <ellipse cx="120" cy="194" rx="72" ry="10" fill="#00000020"></ellipse>

  <!-- PIPE LEFT -->
  <rect x="20" y="102" width="58" height="36" rx="8" fill="#64748B"></rect>
  <rect x="28" y="110" width="42" height="20" rx="4" fill="#94A3B8"></rect>

  <!-- PIPE RIGHT -->
  <rect x="162" y="102" width="58" height="36" rx="8" fill="#64748B"></rect>
  <rect x="170" y="110" width="42" height="20" rx="4" fill="#94A3B8"></rect>

  <!-- MAIN FLOW BODY -->
  <rect x="66" y="76" width="108" height="88" rx="24" fill="#334155"></rect>

  <!-- INNER BODY -->
  <rect x="78" y="88" width="84" height="64" rx="16" fill="#475569"></rect>

  <!-- FLOW TUBE -->
  <rect x="88" y="108" width="64" height="24" rx="12" fill="#0F172A"></rect>

  <!-- FLOW ANIMATION -->
  <g opacity="0.95">

    <path d="M96 120H144" stroke="#38BDF8" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 8">

      <animate attributeName="stroke-dashoffset" from="18" to="0" dur="0.6s" repeatCount="indefinite"></animate>

    </path>

  </g>

  

  <!-- DIGITAL DISPLAY -->
  <rect x="90" y="40" width="60" height="28" rx="6" fill="#111827"></rect>

  <!-- DISPLAY TEXT -->
  <text x="98" y="58" font-size="14" font-family="monospace" fill="#22C55E">125</text>

  <text x="128" y="58" font-size="8" font-family="Arial" fill="#86EFAC">m³/h</text>

  <!-- DISPLAY GLOW -->
  <rect x="92" y="42" width="56" height="24" rx="5" stroke="#22C55E" stroke-opacity="0.3"></rect>

 

  <!-- FLOW INDICATOR -->
  <g transform="translate(120 120)">

    <animateTransform attributeName="transform" type="scale" values="1 1;1.06 1.06;1 1" dur="1s" repeatCount="indefinite" additive="sum"></animateTransform>

    <circle cx="0" cy="0" r="6" fill="#38BDF8"></circle>

  </g>

  <!-- STATUS LIGHT -->
  <circle cx="162" cy="52" r="5" fill="#22C55E">

    <animate attributeName="opacity" values="1;0.35;1" dur="1.2s" repeatCount="indefinite"></animate>

  </circle>

  <!-- DATA SIGNAL -->
  <g opacity="0.7">

    <path d="M170 52
             C178 46 184 58 192 52" stroke="#22C55E" stroke-width="2" stroke-linecap="round">

      <animate attributeName="opacity" values="0.2;1;0.2" dur="1s" repeatCount="indefinite"></animate>

    </path>

    <path d="M174 46
             C184 38 192 66 202 46" stroke="#22C55E" stroke-width="2" stroke-linecap="round" opacity="0.6">

      <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"></animate>

    </path>

  </g>

</svg>
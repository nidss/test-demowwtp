<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- SHADOW -->
  <ellipse cx="120" cy="198" rx="78" ry="10" fill="#00000020"></ellipse>

  <!-- BASE -->
  <rect x="44" y="162" width="152" height="22" rx="8" fill="#1E293B"></rect>

  <!-- MAIN BLOWER BODY -->
  <rect x="52" y="72" width="136" height="88" rx="22" fill="#334155"></rect>

  <!-- INNER BODY -->
  <rect x="64" y="84" width="112" height="64" rx="16" fill="#475569"></rect>

  <!-- AIR INTAKE -->
  <circle cx="92" cy="116" r="26" fill="#1E293B"></circle>
  <circle cx="92" cy="116" r="18" fill="#0F172A"></circle>

  <!-- FAN -->
  <g transform="translate(92 116)">

    <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1s" repeatCount="indefinite" additive="sum"></animateTransform>

    <!-- BLADES -->
    <path d="M0 -16 C8 -14 12 -8 10 0 L0 0Z" fill="#38BDF8"></path>
    <path d="M16 0 C14 8 8 12 0 10 L0 0Z" fill="#0EA5E9"></path>
    <path d="M0 16 C-8 14 -12 8 -10 0 L0 0Z" fill="#0284C7"></path>
    <path d="M-16 0 C-14 -8 -8 -12 0 -10 L0 0Z" fill="#0369A1"></path>

    <!-- HUB -->
    <circle cx="0" cy="0" r="6" fill="#E2E8F0"></circle>

  </g>

  <!-- AIR FLOW -->
  <g opacity="0.85">

    <path d="M146 102
             C164 102 170 96 184 96" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8">

      <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"></animate>

    </path>

    <path d="M146 116
             C170 116 178 116 198 116" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8">

      <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"></animate>

    </path>

    <path d="M146 130
             C164 130 170 136 184 136" stroke="#38BDF8" stroke-width="4" stroke-linecap="round" stroke-dasharray="8 8">

      <animate attributeName="stroke-dashoffset" from="16" to="0" dur="0.7s" repeatCount="indefinite"></animate>

    </path>

  </g>

  <!-- MOTOR -->
  <rect x="72" y="34" width="96" height="32" rx="10" fill="#1E293B"></rect>
  <rect x="84" y="22" width="72" height="18" rx="6" fill="#475569"></rect>

  <!-- MOTOR DETAILS -->
  <line x1="86" y1="48" x2="154" y2="48" stroke="#94A3B8" stroke-width="2"></line>
  <line x1="86" y1="56" x2="154" y2="56" stroke="#94A3B8" stroke-width="2"></line>

  <!-- PIPE OUT -->
  <rect x="182" y="102" width="38" height="28" rx="8" fill="#64748B"></rect>
  <rect x="188" y="108" width="24" height="16" rx="4" fill="#94A3B8"></rect>

  <!-- BOLTS -->
  <circle cx="68" cy="88" r="3.5" fill="#CBD5E1"></circle>
  <circle cx="172" cy="88" r="3.5" fill="#CBD5E1"></circle>
  <circle cx="68" cy="144" r="3.5" fill="#CBD5E1"></circle>
  <circle cx="172" cy="144" r="3.5" fill="#CBD5E1"></circle>

  <!-- STATUS LIGHT -->
  <circle cx="178" cy="50" r="5" fill="#22C55E">

    <animate attributeName="opacity" values="1;0.35;1" dur="1s" repeatCount="indefinite"></animate>

  </circle>

</svg>
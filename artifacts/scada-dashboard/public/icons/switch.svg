  <!-- SWITCH KNOB (ON POSITION) -->
<g transform="translate(106 118)">

  <circle cx="0" cy="0" r="14" fill="#E2E8F0"></circle>
  <circle cx="0" cy="0" r="8" fill="#94A3B8"></circle>

</g>

  <!-- ON LABEL -->

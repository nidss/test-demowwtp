  <!-- TERMINALS -->
  <circle cx="88" cy="166" r="4" fill="#CBD5E1"></circle>
  <circle cx="104" cy="166" r="4" fill="#CBD5E1"></circle>
  <circle cx="136" cy="166" r="4" fill="#CBD5E1"></circle>

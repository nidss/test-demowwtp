  <!-- OUTER BODY -->
  <rect x="58" y="42" width="124" height="146" rx="22" fill="#334155"></rect>

  <!-- INNER PANEL -->
  <rect x="70" y="54" width="100" height="122" rx="16" fill="#475569"></rect>

  <!-- TOP DISPLAY -->

<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- SHADOW -->
  <ellipse cx="120" cy="208" rx="62" ry="10" fill="#00000020"></ellipse>

  <!-- TANK BODY -->
  <rect x="60" y="40" width="120" height="150" rx="28" fill="#334155"></rect>

  <!-- INNER BODY -->
  <rect x="72" y="52" width="96" height="126" rx="20" fill="#475569"></rect>

  <!-- TOP CAP -->
  <ellipse cx="120" cy="40" rx="60" ry="16" fill="#64748B"></ellipse>
  <ellipse cx="120" cy="40" rx="48" ry="10" fill="#94A3B8"></ellipse>

  <!-- BOTTOM CAP -->
  <ellipse cx="120" cy="190" rx="60" ry="16" fill="#1E293B"></ellipse>

  <!-- LIQUID -->
  <clipPath id="tankClip">
    <rect x="72" y="52" width="96" height="126" rx="20"></rect>
  </clipPath>

  <g clip-path="url(#tankClip)">

    <!-- WATER -->
    <rect x="72" y="108" width="96" height="70" fill="#0EA5E9"></rect>

    <!-- WAVE -->
    <path d="
      M72 112
      C82 104 92 120 102 112
      C112 104 122 120 132 112
      C142 104 152 120 168 112
      V178
      H72
      Z" fill="#38BDF8">

      <animateTransform attributeName="transform" type="translate" values="0 0; 0 4; 0 0" dur="2s" repeatCount="indefinite"></animateTransform>

    </path>

  </g>

  <!-- LEVEL INDICATOR -->
  <rect x="186" y="58" width="12" height="116" rx="6" fill="#1E293B"></rect>

  <clipPath id="levelClip">
    <rect x="186" y="58" width="12" height="116" rx="6"></rect>
  </clipPath>

  <g clip-path="url(#levelClip)">
    <rect x="186" y="110" width="12" height="64" fill="#22C55E">
      <animate attributeName="y" values="112;108;112" dur="2s" repeatCount="indefinite"></animate>
    </rect>
  </g>

  <!-- LEVEL MARKS -->
  <line x1="182" y1="78" x2="202" y2="78" stroke="#CBD5E1" stroke-width="2"></line>
  <line x1="182" y1="116" x2="202" y2="116" stroke="#CBD5E1" stroke-width="2"></line>
  <line x1="182" y1="154" x2="202" y2="154" stroke="#CBD5E1" stroke-width="2"></line>

  <!-- TOP PIPE -->
  <rect x="108" y="12" width="24" height="32" rx="6" fill="#64748B"></rect>
  <rect x="112" y="18" width="16" height="20" rx="4" fill="#94A3B8"></rect>

  <!-- OUTPUT PIPE -->
  <rect x="168" y="126" width="40" height="24" rx="6" fill="#64748B"></rect>
  <rect x="174" y="132" width="28" height="12" rx="4" fill="#94A3B8"></rect>

  <!-- STATUS LIGHT -->
  <circle cx="160" cy="62" r="5" fill="#22C55E">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"></animate>
  </circle>

</svg>
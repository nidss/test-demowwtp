<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- SHADOW -->
  <ellipse cx="120" cy="198" rx="68" ry="10" fill="#00000020"></ellipse>

  <!-- PIPE LEFT -->
  <rect x="20" y="104" width="52" height="32" rx="8" fill="#64748B"></rect>
  <rect x="28" y="112" width="36" height="16" rx="4" fill="#94A3B8"></rect>

  <!-- PIPE RIGHT -->
  <rect x="168" y="104" width="52" height="32" rx="8" fill="#64748B"></rect>
  <rect x="176" y="112" width="36" height="16" rx="4" fill="#94A3B8"></rect>

  <!-- MAIN BODY -->
  <circle cx="120" cy="120" r="54" fill="#334155"></circle>
  <circle cx="120" cy="120" r="42" fill="#475569"></circle>

  <!-- INNER RING -->
  <circle cx="120" cy="120" r="28" stroke="#CBD5E1" stroke-width="8"></circle>

  <!-- IMPELLER -->
<g transform="translate(120 120)">

  <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="1.5s" repeatCount="indefinite" additive="sum"></animateTransform>

  <!-- Blade 1 -->
  <path d="M0 -34
           C16 -30 24 -18 18 -4
           L0 0Z" fill="#38BDF8"></path>

  <!-- Blade 2 -->
  <path d="M34 0
           C30 16 18 24 4 18
           L0 0Z" fill="#0EA5E9"></path>

  <!-- Blade 3 -->
  <path d="M0 34
           C-16 30 -24 18 -18 4
           L0 0Z" fill="#0284C7"></path>

  <!-- Blade 4 -->
  <path d="M-34 0
           C-30 -16 -18 -24 -4 -18
           L0 0Z" fill="#0369A1"></path>

</g>

  <!-- CENTER HUB -->
  <circle cx="120" cy="120" r="10" fill="#E2E8F0"></circle>
  <circle cx="120" cy="120" r="4" fill="#64748B"></circle>

  <!-- TOP MOTOR -->
  <rect x="92" y="36" width="56" height="30" rx="8" fill="#1E293B"></rect>
  <rect x="100" y="24" width="40" height="18" rx="6" fill="#475569"></rect>

  <!-- MOTOR DETAILS -->
  <line x1="102" y1="46" x2="138" y2="46" stroke="#94A3B8" stroke-width="2"></line>
  <line x1="102" y1="54" x2="138" y2="54" stroke="#94A3B8" stroke-width="2"></line>

  <!-- STATUS LIGHT -->
  <circle cx="150" cy="50" r="5" fill="#22C55E">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"></animate>
  </circle>

</svg>
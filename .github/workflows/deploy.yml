name: Deploy to GitHub Pages

# Build the SCADA dashboard from the pnpm monorepo and publish it to GitHub
# Pages. The app is a static SPA served from a repo subpath, so BASE_PATH is
# set to "/<repo-name>/" and the SPA fallback (404.html) plus .nojekyll are
# added after the Vite build.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        # not frozen: the lockfile hasn't been regenerated since d3-geo /
        # topojson-client were added to package.json. Once you run a local
        # `pnpm install` and commit the updated pnpm-lock.yaml, you can switch
        # this back to `--frozen-lockfile` for reproducible CI installs.
        run: pnpm install --no-frozen-lockfile

      - name: Build scada-dashboard
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          NODE_ENV: production
        run: pnpm --filter @workspace/scada-dashboard run build

      - name: Add SPA fallback + .nojekyll
        run: |
          cd artifacts/scada-dashboard/dist/public
          cp index.html 404.html
          touch .nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/scada-dashboard/dist/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
